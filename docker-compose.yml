services:
  zonzon:
    build:
      context: .
      dockerfile: Dockerfile.zonzon
    container_name: hotdog_agent_gateway
    cap_add:
      - NET_ADMIN
    ports:
      - "58080:80/tcp"
    volumes:
      - ./config:/app/config:ro
    environment:
      - ZONZON_PORT=53
      - ZONZON_FALLBACK_DNS=1.1.1.1
    networks:
      pi_network:
        ipv4_address: 172.53.0.53
      external_net:
    restart: unless-stopped

  pi-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${HOTDOG_IMAGE:-hotdog-ticket-assistant:local}
    container_name: pi_coding_agent
    
    tty: true
    stdin_open: true

    # Force all domain resolution through zonzon's L7 Intercept Mesh
    dns:
      - 172.53.0.53

    environment:
      - HOME=/home/node
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - PARANOID_MODE=${PARANOID_MODE:-true}
      - GIT_AUTHOR_NAME=${GIT_NAME}
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_NAME=${GIT_NAME}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - GIT_CONFIG_COUNT=2
      - GIT_CONFIG_KEY_0=user.signingkey
      - GIT_CONFIG_VALUE_0=${GIT_GPG_KEY}
      - GIT_CONFIG_KEY_1=commit.gpgsign
      - GIT_CONFIG_VALUE_1=${GIT_GPG_SIGN:-false}

    secrets:
      - source: github_token
        target: ${SECRET_TARGET_PATH:-/run/secrets/gh_default}

    volumes:
      - workspace:/workspace
      - pi_data:/home/node/.pi
      
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    read_only: true

    tmpfs:
      - /tmp:noexec,nodev,nosuid,mode=1777
      - /home/node/.config:uid=${HOST_UID:-1000},gid=${HOST_GID:-1000},mode=700,noexec,nodev,nosuid
      - /home/node/.npm:uid=${HOST_UID:-1000},gid=${HOST_GID:-1000},mode=700,noexec,nodev,nosuid

    pids_limit: 150

    networks:
      - pi_network

    restart: "no"
    depends_on:
      - zonzon

volumes:
  pi_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.pi-data

  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/workspace

networks:
  pi_network:
    name: hotdog_agent_gateway
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.53.0.0/16
  external_net:
    driver: bridge

secrets:
  github_token:
    file: ${PWD}/.secrets/github_token.txt